interface:
  display_name: "YouTube Render PDF"
  short_description: "Turn a YouTube lecture into a structured LaTeX/PDF note set."
  default_prompt: "Use this skill to turn a YouTube video into a high-quality LaTeX course note with clear pedagogical motivation and logic, extracted figures inspected with view image rather than OCR, exhaustive frame recall before selection, segment splitting with parallel subagents for longer videos, the original video cover on the front page, and a final synthesis chapter. Prefer platform subtitles first; when suitable subtitles are unavailable, use the same device-aware ASR backend policy as the Bilibili skill, and normalize the result into SRT or timestamped segments before downstream use."
