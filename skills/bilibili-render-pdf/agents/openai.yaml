interface:
  display_name: "Bilibili Render PDF"
  short_description: "Turn a Bilibili lecture into a structured LaTeX/PDF note set."
  default_prompt: "Use this skill to turn a Bilibili video into a high-quality LaTeX course note with clear pedagogical motivation and logic, extracted figures inspected with view image rather than OCR, exhaustive frame recall before selection, segment splitting with parallel subagents for longer videos, the original video cover on the front page, and a final synthesis chapter. When CC subtitles are unavailable, use a device-aware ASR backend: default to Qwen3-ASR-1.7B plus Qwen3-ForcedAligner-0.6B on CUDA machines, and default to a Whisper backend on Apple Silicon Macs. Normalize ASR output into SRT or timestamped segments before downstream use."
